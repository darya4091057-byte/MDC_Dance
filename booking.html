<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDC Dancing - Запись</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-form {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .booking-form label {
            color: #ffffff;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .booking-form input,
        .booking-form select,
        .booking-form textarea {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            margin-bottom: 18px;
            transition: 0.3s;
        }
        .booking-form input:focus,
        .booking-form select:focus,
        .booking-form textarea:focus {
            border-color: #ff6b6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.2);
        }
        .btn-submit {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            transition: 0.3s;
            width: 100%;
        }
        .btn-submit:hover {
            background: #ff5252;
            transform: scale(1.02);
            color: #fff;
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-title h2 {
            color: #ffffff;
        }
        .form-title p {
            color: #aaaaaa;
        }
        .alert-message {
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        .alert-success {
            background: #1a3a1a;
            color: #8f8;
            border: 1px solid #2a5a2a;
        }
        .alert-error {
            background: #3a1a1a;
            color: #f88;
            border: 1px solid #5a2a2a;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">MDC <span>Dancing</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="styles.html">Направления</a></li>
                    <li class="nav-item"><a class="nav-link" href="choreographers.html">Хореографы</a></li>
                    <li class="nav-item"><a class="nav-link active" href="booking.html">Запись</a></li>
                    <li class="nav-item"><a class="nav-link" href="php/admin.php" style="color: #ff6b6b !important;">🔐 Админ</a></li>
                    <li class="nav-item"><a class="nav-link" href="todo.html">ToDo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="booking-form">
            <div class="form-title">
                <h2>Запись на <span style="color: #ff6b6b;">занятие</span></h2>
                <p>Заполните форму, и мы свяжемся с вами в ближайшее время</p>
            </div>

            <div id="alertMessage" class="alert-message"></div>

            <form id="bookingForm" action="php/save_booking.php" method="POST">
                
                <label for="name">Ваше имя <span style="color: #ff6b6b;">*</span></label>
                <input type="text" id="name" name="name" placeholder="Иван Петров" required>

                <label for="phone">Номер телефона <span style="color: #ff6b6b;">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ivan@example.com">

                <label for="style">Направление <span style="color: #ff6b6b;">*</span></label>
                <select id="style" name="style" required>
                    <option value="">Выберите стиль</option>
                    <option value="Хип-Хоп">Хип-Хоп</option>
                    <option value="Хай Хилс">Хай Хилс</option>
                    <option value="Стретчинг">Стретчинг</option>
                    <option value="Фрейм Ап">Фрейм Ап</option>
                    <option value="Вог">Вог</option>
                    <option value="Афро">Афро</option>
                    <option value="Джаз Фанк">Джаз Фанк</option>
                    <option value="Денс-Холл">Денс-Холл</option>
                </select>

                <label for="date">Желаемая дата</label>
                <input type="date" id="date" name="date">

                <label for="message">Комментарий</label>
                <textarea id="message" name="message" rows="3" placeholder="Дополнительные пожелания..."></textarea>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-paper-plane me-2"></i> Отправить заявку
                </button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>MDC <span>Dancing</span> — танцевальная студия премиум-класса</p>
            <small style="color: #444;">© <span id="currentYear"></span> Все права защищены</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Отправка...';
            
            alertEl.style.display = 'none';
            alertEl.className = 'alert-message';
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('php/save_booking.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                alertEl.style.display = 'block';
                
                if (result.success) {
                    alertEl.className = 'alert-message alert-success';
                    alertEl.innerHTML = `<i class="fas fa-check-circle me-2"></i> ${result.message}`;
                    form.reset();
                } else {
                    alertEl.className = 'alert-message alert-error';
                    alertEl.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i> ${result.message}`;
                }
                
            } catch (error) {
                alertEl.style.display = 'block';
                alertEl.className = 'alert-message alert-error';
                alertEl.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i> Ошибка соединения с сервером. Попробуйте позже.`;
                console.error('Ошибка:', error);
            }
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> Отправить заявку';
        });
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/mdc-dancing/sw.js')
            .then(() => console.log('✅ Service Worker зарегистрирован успешно!'))
            .catch(() => console.log('❌ Ошибка регистрации Service Worker'));
    }
    </script>
</body>
</html>
